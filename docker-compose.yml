name: ordenai

services:
  postgres:
    image: postgres:16-alpine
    container_name: ordenai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ordenai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ordenai_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ordenai}
      # Relatórios agregam em horário LOCAL do processo (ver CLAUDE.md > Relatórios).
      # Fixar o fuso do banco evita divergência entre a máquina do dev e o container.
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Roda apenas na PRIMEIRA inicialização (volume vazio). Ver README do diretório.
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ordenai} -d ${POSTGRES_DB:-ordenai}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
    name: ordenai_postgres_data
